<!DOCTYPE html>
<html lang="en">
	<head>
			<meta charset="UTF-8">
			<title>PWHL Standings</title>
			<meta name="viewport" content="width=device-width, initial-scale=1.0">

			<script src="js/tablesort/tablesort.min.js"></script>
			<link href="js/tablesort/css/tablesort.css" rel="stylesheet">
			<script src="js/tables.js" defer></script>
	</head>

	<body>
		<header>
			<!-- <h1>PWHL Standings</h1> -->
		</header>
		<main>
			<table>
				<caption>Standings</caption>

				<colgroup>
					<col />

				<colgroup>
					<col />
					<col />
					<col />
					<col />
					<col />
					<col />
					<col />
					<col />
					<col />
					<col />
				</colgroup>

				<thead>
					<tr>
						<!-- scope helps screen readers -->
						<th scope="col">PWHL</th>
						<th scope="col">GP</th>
						<th scope="col">GR</th>
						<th scope="col">PTS</th>
						<th scope="col">W</th>
						<th scope="col">OTW</th>
						<th scope="col">OTL</th>
						<th scope="col">L</th>
						<th scope="col">PCT</th>
						<th scope="col">GF</th>
						<th scope="col">GA</th>
					</tr>
				</thead>

				<tbody>
					<tr>
						<th scope="row">
							1<img src="https://assets.leaguestat.com/pwhl/logos/50x50/1.png" width="35px">x - Boston Fleet
						</th>
						<td>24</td>
						<td>6</td>
						<td>51</td>
						<td>13</td>
						<td>5</td>
						<td>2</td>
						<td>4</td>
						<td>0.708</td>
						<td>59</td>
						<td>36</td>
					</tr>
				</tbody>
				
				<tfoot>
					<tr>
						<!-- colspan is how many columns this will take up. also rowspan -->
						<td colspan="4">x = Clinched Playoff Position<br>e = Eliminated from playoff contention</td>
					</tr>
				</tfoot>
			</table>
		</main>
		<footer>
			
		</footer>
	</body>
</html>
